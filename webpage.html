<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Colorful Webpage</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 30px;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(45deg, #ff6a00, #ee0979);
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
      background: linear-gradient(45deg, #00c6ff, #0072ff);
    }

    #message {
      margin-top: 20px;
      font-size: 1.3rem;
      color: #ffd700;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🌈 Welcome to My Colorful Webpage</h1>
    <p>Click the button to see magic!</p>
    <button onclick="showMessage()">Click Me</button>
    <div id="message"></div>
  </div>

  <script>
    function showMessage() {
      const msg = document.getElementById("message");
      msg.innerHTML = "✨ You clicked the button! Keep building awesome projects 🚀";
    }
  </script>

</body>
</html>
